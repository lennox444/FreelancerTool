version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: freelancer-postgres
    environment:
      POSTGRES_DB: freelancer_dev
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d freelancer_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
